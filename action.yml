name: web-openscad-editor
description: Generate a web OpenSCAD editor export
author: yawkat

inputs:
  config:
    description: "Path to TOML configuration file (recommended). When set, this replaces all other configuration options."
    required: false
  clean-urls:
    description: "Omit .html in generated links (for hosts that map /foo -> /foo.html)."
    required: false
    default: "true"
  output:
    description: "Output directory."
    required: false
    default: out

runs:
  using: composite
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        # Cache should be keyed off this action's Python deps, not the caller repository.
        working-directory: ${{ github.action_path }}
        cache-dependency-glob: |
          uv.lock
          pyproject.toml

    - name: Install Python dependencies
      working-directory: ${{ github.action_path }}
      shell: bash
      run: |
        set -euo pipefail
        uv sync --frozen

    - name: Generate web export
      working-directory: ${{ github.action_path }}
      shell: bash
      run: |
        set -euo pipefail

        config_file='${{ inputs.config }}'
        config_file="${config_file//$'\r'/}"

        out='${{ inputs.output }}'
        if [[ "$out" = /* ]]; then
          out_path="$out"
        else
          out_path="$GITHUB_WORKSPACE/$out"
        fi

        args=()
        if [[ "$config_file" != /* ]]; then
          config_file="$GITHUB_WORKSPACE/$config_file"
        fi
        args+=(--config "$config_file")
        if [ '${{ inputs.clean-urls }}' = 'true' ]; then
          args+=(--clean-urls)
        fi
        args+=(--output "$out_path")

        uv run python generate.py "${args[@]}"
